<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Halloween Soundboard</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #111;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 10px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 700px;
      margin-top: 20px;
    }

    button.sound-btn {
      border: none;
      border-radius: 12px;
      padding: 16px 10px;
      font-size: 0.95rem;
      background: #333;
      color: #f5f5f5;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out, background 0.08s ease-out;
      text-align: center;
      word-wrap: break-word;
    }

    button.sound-btn:hover {
      background: #444;
      box-shadow: 0 3px 10px rgba(0,0,0,0.6);
    }

    button.sound-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      background: #555;
    }
  </style>
</head>
<body>
  <h1>Halloween Soundboard</h1>
  <p>Click a button to play a line.</p>

  <div class="board" id="board"></div>

  <script>
    const sounds = [
      { label: "I'm all broken up",       file: "im_all_broken_up.mp3" },
      { label: "Choke the chicken",       file: "choke_the_chicken.mp3" },
      { label: "Crawl over there",        file: "crawl_over_there.mp3" },
      { label: "That's all that does",    file: "thats_all_that_does.mp3" },
      { label: "Waaahhh",                 file: "waaaaahhhhh.mp3" },
      { label: "Sit on it",               file: "sit_on_it.mp3" },
      { label: "My Daddy",               file: "my_daddy.mp3" },
      { label: "RBMG",               file: "red_ball.mp3" }
    ];

    const boardEl = document.getElementById("board");

    sounds.forEach(s => {
      const audio = new Audio(s.file);
      const btn = document.createElement("button");
      btn.className = "sound-btn";
      btn.textContent = s.label;

      btn.addEventListener("click", () => {
        audio.currentTime = 0;
        audio.play().catch(err => console.error("Audio play failed:", err));
      });

      boardEl.appendChild(btn);
    });
  </script>
</body>
</html>
